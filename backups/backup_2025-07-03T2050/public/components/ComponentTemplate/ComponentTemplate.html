<!-- ComponentTemplate HTML Template -->
<div id="component-template-container" class="component-template-container">
  <div class="component-template-content">
    <div class="component-template-header">
      <h3>Component Template</h3>
      <button class="component-template-close" id="component-template-close-btn" aria-label="Close component">×</button>
    </div>
    
    <div class="component-template-body">
      <div class="component-template-section">
        <p>This is a template for creating new components.</p>
        <p>Replace this content with your component's HTML structure.</p>
      </div>
      
      <div class="component-template-actions">
        <button id="component-template-action-btn" class="component-template-btn-primary">
          Action Button
        </button>
        <button id="component-template-cancel-btn" class="component-template-btn-secondary">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
