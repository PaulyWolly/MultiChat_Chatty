<!-- Script Manager Modal -->

<div id="script-manager-modal" class="script-manager-modal" style="display:none;">
    <div class="script-manager-modal-content">
        <div class="script-manager-header">
            <h2>🔧 Script Manager</h2>
            <button id="close-script-manager" class="script-manager-close">&times;</button>
        </div>
        <div class="script-manager-body">
            <div class="script-categories">
                <button class="category-btn active" data-category="all">
                    📁 All Scripts
                </button>
                <button class="category-btn" data-category="movies">
                    🎬 Movies
                </button>
                <button class="category-btn" data-category="tv-shows">
                    📺 TV Shows
                </button>
                <button class="category-btn" data-category="system">
                    ⚙️ System
                </button>
                <button class="category-btn" data-category="audio">
                    🎵 Audio
                </button>
                <button class="category-btn" data-category="youtube">
                    📹 YouTube
                </button>
                <button class="category-btn" data-category="fixes">
                    🔧 Fixes
                </button>
                <button class="category-btn" data-category="development">
                    💻 Development
                </button>
            </div>
            <div class="scripts-container">
                <div id="scripts-list" class="scripts-list">
                    <!-- Scripts will be loaded here -->
                </div>
            </div>
        </div>
    </div>
</div>
