<!-- ConfirmModal HTML Template -->
<div id="confirm-modal-container" class="confirm-modal-container" style="display:none;">
  <div class="confirm-modal-content">
    <div class="confirm-modal-header">
      <h3 id="confirm-modal-title">Confirm Action</h3>
    </div>
    <div class="confirm-modal-body">
      <p id="confirm-modal-message">Are you sure?</p>
    </div>
    <div class="confirm-modal-actions">
      <button id="confirm-modal-confirm-btn" class="confirm-modal-btn confirm-modal-btn-primary">Confirm</button>
      <button id="confirm-modal-cancel-btn" class="confirm-modal-btn confirm-modal-btn-secondary">Cancel</button>
    </div>
  </div>
</div>
