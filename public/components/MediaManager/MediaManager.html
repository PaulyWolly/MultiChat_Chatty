<div class="media-manager-overlay">
  <div class="media-manager-modal">
    <button class="media-manager-close-btn" type="button" title="Close">&times;</button>
    <div class="media-manager-tabs">
      <button class="media-manager-tab media-manager-tab-movie active">Movie</button>
      <button class="media-manager-tab media-manager-tab-tv">TV Show</button>
    </div>
    <div class="media-manager-mode-toggle">
      <button class="media-manager-mode-btn media-manager-mode-single active">Single</button>
      <button class="media-manager-mode-btn media-manager-mode-all">All</button>
    </div>
    <div class="media-manager-content media-manager-content-single">
      <form class="media-manager-single-form">
        <div class="MM-form-fields-BKGD">
            
            <div class="media-manager-form-row">
                <label class="media-manager-label" for="media-manager-title">Title or TMDB ID
                    <span class="media-manager-required">*</span>
                    <span class="media-manager-info-icon" data-tooltip="Enter the exact Movie or TV Show name, or the TMDB ID. Example: Batman: The Movie or 2661 Case sensitive for best results."><span class="media-manager-info-icon-inner"></span></span>
                </label>
                <input class="media-manager-input" id="media-manager-title" type="text" placeholder="e.g. Batman: The Movie or 2661">
                <div class="media-manager-field-error" id="title-error" style="display: none;">Title or TMDB ID is required</div>
            </div>
            <div class="media-manager-form-row">
                <label class="media-manager-label" for="media-manager-path">File/Folder Path
                    <span class="media-manager-required">*</span>
                    <span class="media-manager-info-icon" data-tooltip="Enter the full path to the movie or TV show file/folder. Example: S:/MEDIA/MOVIES/Airplane! (1980) [1080p]/Airplane!.(1980).[1080p].mp4 sMust match your naming convention."><span class="media-manager-info-icon-inner"></span></span>
                </label>
                <input class="media-manager-input" id="media-manager-path" type="text" placeholder="e.g. S:/MEDIA/MOVIES/Airplane! (1980) [1080p]/Airplane!.(1980).[1080p].mp4">
                <div class="media-manager-field-error" id="path-error" style="display: none;">File/Folder Path is required</div>
            </div>
            <div class="media-manager-form-row">
                <button class="media-manager-fetch-btn" type="button">Fetch Info
                    <span class="media-manager-info-icon" data-tooltip="Fetches info from TMDB for the entered title or ID. Example: Enter 'Batman: The Movie' or '2661' and click Fetch Info."><span class="media-manager-info-icon-inner"></span></span>
                </button>
            </div>
                           
        </div>
      </form>
      <div class="media-manager-preview">
        <div class="media-manager-preview-poster">
          <img class="media-manager-poster-img" src="" alt="Poster Preview">
          <button class="media-manager-edit-poster-btn" type="button">Edit Poster
            <span class="media-manager-info-icon" data-tooltip="Change or upload a different poster image.\nRecommended: 500x750px JPG or PNG."><span class="media-manager-info-icon-inner"></span></span>
          </button>
        </div>

        <div class="media-manager-details-row" style="display: flex; flex-direction: row; gap: 32px;">
          <div class="media-manager-description-section" style="flex: 2;">
            <div class="media-manager-preview-description">
              <label class="media-manager-label" for="media-manager-description">Description
                <span class="media-manager-info-icon" data-tooltip="Edit or review the movie/TV show description.\nExample: 'A caped crusader battles crime in Gotham City.'"><span class="media-manager-info-icon-inner"></span></span>
              </label>
              <textarea class="media-manager-input media-manager-description-input" id="media-manager-description" placeholder="e.g. A caped crusader battles crime in Gotham City."></textarea>
            </div>
          </div>
          <div class="media-manager-cast-section" style="flex: 1;">
            <div class="media-manager-preview-cast">
              <label class="media-manager-label">Cast
                <span class="media-manager-info-icon" data-tooltip="Edit or review the cast list for this title.\nExample: Adam West, Burt Ward, Lee Meriwether"><span class="media-manager-info-icon-inner"></span></span>
              </label>
              <div class="media-manager-cast-list">
                <!-- Cast items will be rendered here -->
              </div>
              <button class="media-manager-edit-cast-btn" type="button">Edit Cast
                <span class="media-manager-info-icon" data-tooltip="Change or update the cast list.\nExample: Add or remove actors as needed."><span class="media-manager-info-icon-inner"></span></span>
              </button>
              <button class="media-manager-view-json-btn" type="button">View/Edit JSON
                <span class="media-manager-info-icon" data-tooltip="View and edit the cast data as JSON.\nExample: Copy, edit, or modify the cast structure directly."><span class="media-manager-info-icon-inner"></span></span>
              </button>
                </div>
  </div>
</div>

<!-- JSON Editor Modal -->
<div class="json-editor-overlay" style="display: none;">
  <div class="json-editor-modal">
    <div class="json-editor-header">
      <h3 class="json-editor-title">Cast JSON Editor</h3>
      <button class="json-editor-close-btn" type="button" title="Close">&times;</button>
    </div>
    <div class="json-editor-content">
      <div class="json-editor-info">
        <p>Edit the cast data as JSON. Each cast member should have a "name" and optional "character" field.</p>
        <p><strong>Example:</strong> [{"name": "Adam West", "character": "Batman"}, {"name": "Burt Ward", "character": "Robin"}]</p>
      </div>
      <textarea class="json-editor-textarea" placeholder='[{"name": "Actor Name", "character": "Character Name"}]'></textarea>
      <div class="json-editor-actions">
        <button class="json-editor-copy-btn" type="button">Copy JSON</button>
        <button class="json-editor-save-btn" type="button">Save Changes</button>
        <button class="json-editor-cancel-btn" type="button">Cancel</button>
      </div>
    </div>
  </div>
</div>
        
      </div>
      <div class="media-manager-actions">
        <button class="media-manager-confirm-btn" type="button">Confirm</button>
        <button class="media-manager-edit-btn" type="button">Edit/Resubmit</button>
        <button class="media-manager-cancel-btn" type="button">Cancel</button>
      </div>
    </div>
    <div class="media-manager-content media-manager-content-all" style="display:none;">
      <button class="media-manager-fetch-all-btn" type="button">Fetch All Info</button>
      <div class="media-manager-progress-bar">
        <div class="media-manager-progress"></div>
      </div>
      <div class="media-manager-summary">
        <!-- Summary/results will be shown here -->
      </div>
    </div>
  </div>
</div>
