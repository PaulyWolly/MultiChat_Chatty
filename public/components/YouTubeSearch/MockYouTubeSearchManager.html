<!-- MockYouTubeSearchManager Template -->
<!-- This file contains HTML templates for mock YouTube functionality -->

<!-- Mock Video Item Template -->
<template id="mock-video-item-template">
    <div class="youtube-video-item mock-video" data-video-id="">
        <div class="youtube-thumbnail">
            <img src="" alt="" loading="lazy">
            <div class="youtube-duration"></div>
            <div class="mock-overlay" style="position: absolute; top: 5px; right: 5px; background: #ff6b35; color: white; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold;">MOCK</div>
        </div>
        <div class="youtube-video-info">
            <h4 class="youtube-video-title"></h4>
            <p class="youtube-channel-name"></p>
            <p class="youtube-video-meta">
                <span class="youtube-views"></span>
                <span class="youtube-date"></span>
            </p>
            <p class="youtube-description"></p>
        </div>
        <div class="youtube-video-actions">
            <button class="play-video-btn">▶️ Play</button>
            <button class="add-to-playlist-btn">📋 Add to Playlist</button>
        </div>
    </div>
</template>

<!-- Mock Pagination Bar Template -->
<template id="mock-pagination-bar-template">
    <div class="mock-pagination-bar">
        <div class="mock-pagination-header">
            <span class="mock-indicator" style="color: #ff6b35; font-weight: bold;">🎭 MOCK PAGINATION</span>
            <span class="pagination-info"></span>
        </div>
        <div class="mock-pagination-controls">
            <button class="mock-back-btn">⬅️ Back</button>
            <button class="mock-next-btn">Next ➡️</button>
            <button class="mock-top-btn">⬆️ Top</button>
        </div>
    </div>
</template>

<!-- Mock Results Container Template -->
<template id="mock-results-container-template">
    <div class="youtube-multi-bubble-mock">
        <div class="youtube-header">
            <h3 class="youtube-header-title">🎭 Mock YouTube Results <span style="color: black;"></span></h3>
            <div class="youtube-header-meta">
                <span class="youtube-page-info"></span>
                <span class="youtube-result-count"></span>
                <span class="mock-indicator" style="color: #ff6b35; font-weight: bold;">🎭 MOCK DATA</span>
            </div>
        </div>
        <div class="youtube-video-grid">
            <!-- Video items will be inserted here -->
        </div>
    </div>
</template>

<!-- Mock Single Video Template -->
<template id="mock-single-video-template">
    <div class="youtube-single-bubble-mock">
        <div class="youtube-header">
            <h3 class="youtube-header-title">🎭 Mock YouTube Result <span style="color: black;"></span></h3>
            <div class="youtube-header-meta">
                <span class="mock-indicator" style="color: #ff6b35; font-weight: bold;">🎭 MOCK DATA</span>
            </div>
        </div>
        <div class="youtube-single-video">
            <!-- Single video item will be inserted here -->
        </div>
    </div>
</template>

<!-- Mock Popup Template -->
<template id="mock-popup-template">
    <div class="mock-youtube-popup">
        <div class="mock-popup-header">
            <h3>🎭 Mock YouTube Video</h3>
            <button class="close-popup-btn">✕</button>
        </div>
        <div class="mock-popup-content">
            <div class="mock-video-player">
                <div class="mock-video-placeholder" style="background: #ff6b35; color: white; padding: 40px; text-align: center; border-radius: 8px;">
                    <h4>🎭 Mock Video Player</h4>
                    <p class="mock-video-id"></p>
                    <p>This is a mock video player for development purposes.</p>
                </div>
            </div>
            <div class="mock-video-info">
                <h4 class="mock-video-title"></h4>
                <p class="mock-channel-name"></p>
                <p class="mock-video-meta"></p>
                <p class="mock-video-description"></p>
            </div>
        </div>
    </div>
</template>
